global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # 后端服务监控
  - job_name: 'baby-safety-backend'
    static_configs:
      - targets: ['backend-go:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Vision服务监控
  - job_name: 'baby-safety-vision'
    static_configs:
      - targets: ['vision:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Agent服务监控
  - job_name: 'baby-safety-agent'
    static_configs:
      - targets: ['agent:8002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 节点监控
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Prometheus自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # cAdvisor容器监控
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

# 告警规则
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093