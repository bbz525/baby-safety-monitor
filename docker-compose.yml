version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ./data:/app/data
    depends_on:
      - agent
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

  vision:
    build: ./services/vision
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  agent:
    build: ./services/agent
    ports:
      - "8002:8002"
    environment:
      - BACKEND_BASE=http://backend:8080
    restart: unless-stopped

volumes:
  data:
    driver: local
