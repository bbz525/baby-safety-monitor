version: "3.9"
services:
  # Nginx反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend-go
      - frontend
    restart: unless-stopped
    networks:
      - baby-safety-net

  # Go后端服务
  backend-go:
    build: 
      context: ./backend-go
      dockerfile: Dockerfile.prod
    expose:
      - "8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - DB_DSN=data/baby_safety.db
      - LOG_LEVEL=warn
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK}
      - DINGTALK_SECRET=${DINGTALK_SECRET}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - vision
      - agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - baby-safety-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # 前端服务（生产构建）
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_BASE=/api
        - VITE_VISION_BASE=/vision
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - baby-safety-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # 视觉服务
  vision:
    build: 
      context: ./services/vision
      dockerfile: Dockerfile.prod
    expose:
      - "8001"
    environment:
      - YOLO_WEIGHTS=/models/yolov8n.pt
      - BACKEND_BASE=http://backend-go:8080
      - LOG_LEVEL=warn
      - WORKERS=4
    volumes:
      - ./data:/app/data
      - ./data/models:/models
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - baby-safety-net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # AI代理服务
  agent:
    build: 
      context: ./services/agent
      dockerfile: Dockerfile.prod
    expose:
      - "8002"
    environment:
      - BACKEND_BASE=http://backend-go:8080
      - VISION_BASE=http://vision:8001
      - RISK_THRESHOLD=0.7
      - LOG_LEVEL=warn
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - baby-safety-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # 监控服务
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - baby-safety-net
    profiles: ["monitoring"]

  # 日志收集
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - baby-safety-net
    profiles: ["monitoring"]

# 网络配置
networks:
  baby-safety-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 数据卷配置
volumes:
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  prometheus_data:
    driver: local
  grafana_data:
    driver: local